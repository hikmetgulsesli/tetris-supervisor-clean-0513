<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#343536",
                    "on-error": "#690005",
                    "secondary-container": "#464a4b",
                    "outline-variant": "#44474c",
                    "inverse-primary": "#515f74",
                    "on-background": "#e4e2e4",
                    "secondary-fixed-dim": "#c4c7c9",
                    "inverse-surface": "#e4e2e4",
                    "tertiary": "#dfc299",
                    "on-surface-variant": "#c5c6cd",
                    "surface-bright": "#39393b",
                    "inverse-on-surface": "#303032",
                    "error": "#ffb4ab",
                    "primary": "#b9c7e0",
                    "on-primary-container": "#9eadc5",
                    "on-primary-fixed": "#0d1c2f",
                    "tertiary-fixed": "#fcdeb3",
                    "primary-fixed": "#d5e3fd",
                    "on-tertiary-fixed": "#281901",
                    "tertiary-fixed-dim": "#dfc299",
                    "primary-container": "#334155",
                    "on-secondary": "#2d3133",
                    "surface-tint": "#b9c7e0",
                    "secondary-fixed": "#e0e3e5",
                    "on-error-container": "#ffdad6",
                    "on-secondary-container": "#b6b9bb",
                    "surface-container-highest": "#343536",
                    "primary-fixed-dim": "#b9c7e0",
                    "surface": "#131315",
                    "on-tertiary": "#3f2d10",
                    "on-tertiary-container": "#c3a881",
                    "error-container": "#93000a",
                    "on-primary": "#233144",
                    "on-primary-fixed-variant": "#3a485c",
                    "on-secondary-fixed": "#191c1e",
                    "surface-container-high": "#2a2a2b",
                    "tertiary-container": "#503d1e",
                    "outline": "#8e9197",
                    "on-surface": "#e4e2e4",
                    "on-tertiary-fixed-variant": "#574424",
                    "secondary": "#c4c7c9",
                    "surface-container": "#1f1f21",
                    "on-secondary-fixed-variant": "#444749",
                    "surface-container-lowest": "#0e0e10",
                    "surface-container-low": "#1b1b1d",
                    "surface-dim": "#131315",
                    "background": "#131315"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "grid-gap": "2px",
                    "gutter": "16px",
                    "container-padding": "24px",
                    "touch-target": "44px"
            },
            "fontFamily": {
                    "value-numeric": [
                            "JetBrains Mono"
                    ],
                    "display-lg": [
                            "Space Grotesk"
                    ],
                    "body-sm": [
                            "Inter"
                    ],
                    "headline-md": [
                            "Space Grotesk"
                    ],
                    "label-caps": [
                            "JetBrains Mono"
                    ]
            },
            "fontSize": {
                    "value-numeric": [
                            "20px",

        },
      }

<style>
        body {
            background-color: #0F172A; /* Explicitly forced as per design system instruction for this screen */
        }
        
        .button-glow:focus, .button-glow:hover {
            box-shadow: 0 0 16px rgba(248, 250, 252, 0.5); /* Off-white glow */
            border-color: #F8FAFC;
        }

        /* Stylized decorative background pattern */
        .bg-pattern {
            background-image: 
                linear-gradient(rgba(17, 24, 39, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 24, 39, 0.3) 1px, transparent 1px);
            background-size: 64px 64px;
            background-position: center center;
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col relative overflow-hidden bg-pattern">
<!-- Decorative background elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary opacity-5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Main Content Container -->
<main class="flex-grow flex flex-col items-center justify-center relative z-10 px-container-padding w-full max-w-2xl mx-auto">
<!-- Branding Header -->
<header class="mb-16 text-center">
<h1 class="font-display-lg text-display-lg text-primary tracking-widest uppercase mb-unit">
                TETRIS
            </h1>
<h2 class="font-headline-md text-headline-md text-secondary uppercase tracking-widest">
                SUPERVISOR
            </h2>
<div class="h-px w-32 bg-outline-variant mx-auto mt-8"></div>
</header>
<!-- Menu Navigation -->
<nav aria-label="Main Menu" class="w-full flex flex-col gap-6">
<!-- Start Game Button -->
<button class="group relative w-full h-16 border border-primary bg-surface-container-low hover:bg-surface-tint text-primary hover:text-surface-dim transition-all duration-200 button-glow flex items-center justify-center font-value-numeric text-value-numeric uppercase tracking-widest">
<span class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></span>
<span class="z-10 flex items-center gap-4">
<span class="material-symbols-outlined text-headline-md" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    START GAME
                </span>
</button>
<!-- Options Button -->
<button class="group relative w-full h-16 border border-outline-variant bg-surface-container-low hover:bg-surface-tint text-secondary hover:text-surface-dim transition-all duration-200 button-glow flex items-center justify-center font-value-numeric text-value-numeric uppercase tracking-widest">
<span class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></span>
<span class="z-10 flex items-center gap-4">
<span class="material-symbols-outlined text-headline-md" data-icon="settings">settings</span>
                    OPTIONS
                </span>
</button>
<!-- Controls Button -->
<button class="group relative w-full h-16 border border-outline-variant bg-surface-container-low hover:bg-surface-tint text-secondary hover:text-surface-dim transition-all duration-200 button-glow flex items-center justify-center font-value-numeric text-value-numeric uppercase tracking-widest">
<span class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></span>
<span class="z-10 flex items-center gap-4">
<span class="material-symbols-outlined text-headline-md" data-icon="gamepad">gamepad</span>
                    CONTROLS
                </span>
</button>
</nav>
</main>
<!-- Footer -->
<footer class="w-full p-container-padding flex justify-between items-center z-10 font-label-caps text-label-caps text-on-surface-variant uppercase border-t border-surface-container-high bg-surface-dim/80 backdrop-blur-sm">
<div class="flex items-center gap-2">
<span class="w-2 h-2 bg-primary animate-pulse"></span>
            SYS.v1.0.42
        </div>
<div>
            CLEAN™ PROTOCOL ACTIVE
        </div>
</footer>
</body></html>
